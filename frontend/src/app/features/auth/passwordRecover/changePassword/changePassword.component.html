<div class="brand-name">{{ 'auth.passwordRecover.change.title' | translate }}</div>
<div class="brand-subtitle">{{ 'auth.passwordRecover.change.subtitle' | translate }}</div>

<form class="login-form" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label class="form-label" for="password">{{ 'auth.passwordRecover.change.form.passwordLabel' | translate }}</label>
    <input class="form-input" type="password" id="password" [(ngModel)]="password" name="password" placeholder="********" required />
  </div>

  <div class="form-group">
    <label class="form-label" for="confirmPassword">{{ 'auth.passwordRecover.change.form.confirmPasswordLabel' | translate }}</label>
    <input class="form-input" type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="********" required />
  </div>

  <button class="btn-submit" type="submit" [disabled]="enviando">{{ enviando ? "{{ 'auth.passwordRecover.change.form.submit' | translate }}" : "{{ 'auth.passwordRecover.change.form.submit' | translate }}" }}</button>
</form>
<app-alert-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (close)="cerrarModal()">
</app-alert-modal>
