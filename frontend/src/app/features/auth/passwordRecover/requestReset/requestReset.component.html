<div class="brand-name">{{ 'auth.passwordRecover.request.title' | translate }}</div>
<div class="brand-subtitle">{{ 'auth.passwordRecover.request.subtitle' | translate }}</div>

<form class="login-form" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label class="form-label" for="email">{{ 'auth.passwordRecover.request.form.emailLabel' | translate }}</label>
    <input class="form-input" type="email" id="email" [(ngModel)]="email" name="email" placeholder="{{ 'auth.passwordRecover.request.form.emailPlaceholder' | translate }}" required />
  </div>

  <button class="btn-submit" type="submit" [disabled]="enviando">
    {{ enviando ? "{{ 'auth.passwordRecover.request.form.submitting' | translate }}" : "{{ 'auth.passwordRecover.request.form.submit' | translate }}" }}
  </button>
</form>
<app-alert-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (close)="cerrarModal()">
</app-alert-modal>
